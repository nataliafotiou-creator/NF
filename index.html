  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

b66ee8;\n    --smm:     #4ec98a;\n    --pr:      #e8a33b;\n    --sec:     #e0584f;\n\n    --gap: 14px;\n    --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);\n    --ease-io:  cubic-bezier(0.5, 0, 0.2, 1);\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { background: var(--bg-0); color: var(--text); font-family: 'Inter Tight', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }\n  body {\n    min-width: 1920px;\n    background:\n      radial-gradient(ellipse 1600px 800px at 75% -5%, rgba(201, 162, 106, 0.06), transparent 60%),\n      radial-gradient(ellipse 1200px 600px at 5% 105%, rgba(107, 168, 232, 0.04), transparent 60%),\n      var(--bg-0);\n    padding: 24px 28px 28px;\n    overflow-x: hidden;\n    transform-origin: 0 0;\n    transition: transform 0.2s ease-out;\n  }\n  body::before {\n    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;\n    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.008) 0 1px, transparent 1px 3px);\n    opacity: 0.5;\n  }\n  body > * { position: relative; z-index: 1; }\n\n  .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }\n  .serif { font-family: 'Cormorant Garamond', serif; }\n\n  /* ===== ANIMATIONS ===== */\n  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }\n  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n  @keyframes pulseDot {\n    0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }\n    60%      { box-shadow: 0 0 0 8px transparent; opacity: 0.55; }\n  }\n  @keyframes pulseGlow {\n    0%, 100% { box-shadow: 0 0 0 0 rgba(224, 88, 79, 0.4); }\n    60%      { box-shadow: 0 0 0 12px rgba(224, 88, 79, 0); }\n  }\n  @keyframes shimmer {\n    0% { transform: translateX(-100%); }\n    60%, 100% { transform: translateX(220%); }\n  }\n  @keyframes barFill {\n    from { transform: scaleX(0); } to { transform: scaleX(var(--w, 1)); }\n  }\n  @keyframes ganttGrow {\n    from { transform: scaleX(0); opacity: 0; }\n    to   { transform: scaleX(1); opacity: 1; }\n  }\n  @keyframes blink {\n    0%, 70%, 100% { opacity: 1; } 75%, 95% { opacity: 0.3; }\n  }\n  @keyframes tickFlash {\n    0%, 70% { opacity: 1; } 75% { opacity: 0.35; } 100% { opacity: 1; }\n  }\n\n  .reveal { opacity: 0; animation: fadeUp 0.7s var(--ease-out) forwards; }\n  .reveal.d1 { animation-delay: 0.05s; }\n  .reveal.d2 { animation-delay: 0.15s; }\n  .reveal.d3 { animation-delay: 0.25s; }\n  .reveal.d4 { animation-delay: 0.35s; }\n  .reveal.d5 { animation-delay: 0.45s; }\n  .reveal.d6 { animation-delay: 0.55s; }\n  .reveal.d7 { animation-delay: 0.65s; }\n  .reveal.d8 { animation-delay: 0.75s; }\n\n  /* ===== TOPBAR ===== */\n  /* ===== LIGHT THEME · Добро.рф ===== */\n  body.theme-dobro {\n    --bg-0: #f7f7f8;\n    --bg-1: #ffffff;\n    --bg-2: #ffffff;\n    --bg-3: #f3eef6;\n    --bg-4: #e8e0ee;\n    --line: #e6e4e7;\n    --line-2: #cfd5de;\n    --line-3: #a4b0c1;\n    --text: #15191e;\n    --text-2: #3e4a5b;\n    --text-3: #536279;\n    --text-4: #8695ac;\n    --brand: #6f06f9;\n    --brand-bright: #8c35fd;\n    --brand-deep: #550577;\n    --ok: #21aa1e;\n    --ok-deep: #157515;\n    --warn: #e5ac00;\n    --warn-deep: #b27700;\n    --bad: #ff5e00;\n    --bad-deep: #c74c05;\n    --info: #8c35fd;\n    --info-deep: #5a0fc2;\n    --plan: #ff8742;\n    --plan-deep: #913a08;\n    --design: #6f06f9;\n    --dev: #5a0fc2;\n    --market: #00c0ca;\n    --smm: #0066ff;\n    --pr: #e5ac00;\n    --sec: #ff5e00;\n    background:\n      radial-gradient(ellipse 1600px 800px at 75% -5%, rgba(111,6,249,0.10), transparent 60%),\n      radial-gradient(ellipse 1200px 600px at 5% 105%, rgba(255,94,0,0.06), transparent 60%),\n      var(--bg-0);\n    color: var(--text);\n  }\n  body.theme-dobro::before { display: none; }\n  body.theme-dobro .card,\n  body.theme-dobro .mc-countdown,\n  body.theme-dobro .b-info,\n  body.theme-dobro .b-tasks,\n  body.theme-dobro d; place-items: center; }\n  .ceo-mark svg { width: 18px; height: 18px; stroke: var(--brand); fill: none; stroke-width: 1.5; }\n  .ceo-title { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--brand); font-weight: 600; }\n  .ceo-sub { font-size: 12px; color: var(--text-3); margin-top: 4px; }\n  .ceo-count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 26px; color: var(--brand); font-weight: 700; }\n  .ceo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n  .ceo-item {\n    padding: 12px 14px; background: var(--bg-3); border: 1px solid var(--line); border-radius: 6px;\n    display: grid; grid-template-columns: 22px 1fr; gap: 10px; align-items: start;\n    transition: transform 0.25s var(--ease-out), border-color 0.25s;\n    cursor: pointer;\n  }\n  .ceo-item:hover { transform: translateY(-2px); border-color: var(--line-3); }\n  .ceo-item.urgent { border-color: rgba(224, 88, 79, 0.35); background: linear-gradient(180deg, rgba(224, 88, 79, 0.06), var(--bg-3)); }\n  .ceo-num { width: 22px; height: 22px; border-radius: 4px; background: var(--brand); color: #14110a; display: grid; place-items: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 800; }\n  .ceo-item.urgent .ceo-num { background: var(--bad); color: #fff; animation: pulseGlow 2.2s ease-out infinite; }\n  .ceo-it-title { font-size: 12px; color: var(--text); font-weight: 600; line-height: 1.3; }\n  .ceo-it-detail { font-size: 10px; color: var(--text-3); margin-top: 4px; line-height: 1.45; }\n  .ceo-it-foot { display: flex; gap: 12px; margin-top: 6px; font-size: 9px; color: var(--text-3); letter-spacing: 0.06em; }\n  .ceo-it-foot .by { color: var(--brand); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }\n  .ceo-it-foot .by.urgent { color: var(--bad); }\n\n  /* Нарек highlight banner (inside Security block) */\n  .naret-banner {\n    margin-top: 12px;\n    padding: 14px 16px;\n    background: linear-gradient(135deg, rgba(224,88,79,0.10), rgba(255,255,255,0));\n    border: 1px solid rgba(224, 88, 79, 0.35);\n    border-left: 3px solid var(--bad);\n    border-radius: 6px;\n    display: grid; grid-template-columns: 38px 1fr; gap: 12px; align-items: center;\n  }\n  .naret-banner .icn {\n    width: 38px; height: 38px; border-radius: 50%;\n    background: rgba(224, 88, 79, 0.10); border: 1px solid var(--bad);\n    display: grid; place-items: center;\n    color: var(--bad);\n    animation: pulseGlow 2.4s ease-out infinite;\n  }\n  .naret-banner .icn svg { width: 18px; height: 18px; stroke: var(--bad); fill: none; stroke-width: 1.8; }\n  .naret-banner .ttl { font-size: 14px; color: var(--text); font-weight: 600; line-height: 1.3; }\n  .naret-banner .sub { font-size: 13px; color: var(--text-2); margin-top: 4px; line-height: 1.5; }\n  .naret-banner .sub b { color: var(--bad); }\n\n  /* ===== FOOTER ===== */\n  .footer-bar {\n    margin-top: 26px; padding: 18px 0 4px;\n    display: flex; justify-content: space-between; align-items: center;\n    border-top: 1px solid var(--line);\n    font-size: 10px; color: var(--text-4); letter-spacing: 0.16em; text-transform: uppercase;\n  }\n  .footer-bar .right { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: none; }\n\n  .live-tag {\n    display: inline-flex; align-items: center; gap: 6px;\n    padding: 3px 8px; border-radius: 3px;\n    background: rgba(78, 201, 138, 0.10); color: var(--ok);\n    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600;\n  }\n  .live-tag::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--ok); color: var(--ok); animation: pulseDot 1.6s ease-out infinite; }\n\n  /* ============================================================== */\n  /* =====  TASK EDIT MODAL ======================================= */\n  /* ============================================================== */\n  .modal-backdrop {\n (--p), var(--bg-3) var(--p), var(--bg-3) 100%);\n  }\n  .modal-slider::-webkit-slider-thumb {\n    -webkit-appearance: none; appearance: none;\n    width: 22px; height: 22px; border-radius: 50%;\n    background: var(--text); border: 4px solid var(--m-accent, var(--brand));\n    cursor: grab; box-shadow: 0 2px 8px rgba(0,0,0,0.4);\n    transition: transform 0.15s;\n  }\n  .modal-slider::-webkit-slider-thumb:hover { transform: scale(1.1); }\n  .modal-slider::-moz-range-thumb {\n    width: 22px; height: 22px; border-radius: 50%;\n    background: var(--text); border: 4px solid var(--m-accent, var(--brand));\n    cursor: grab; box-shadow: 0 2px 8px rgba(0,0,0,0.4);\n  }\n\n  .modal-meta {\n    display: flex; gap: 22px; flex-wrap: wrap;\n    margin-top: 22px; padding: 14px 16px;\n    background: var(--bg-3); border: 1px solid var(--line); border-radius: 4px;\n    font-size: 11px; color: var(--text-3); letter-spacing: 0.06em;\n  }\n  .modal-meta .k { color: var(--text-3); letter-spacing: 0.16em; text-transform: uppercase; font-size: 9px; font-weight: 700; }\n  .modal-meta .v { color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; margin-left: 6px; }\n  .modal-meta .v.crit { color: var(--bad); }\n  .modal-meta .grp { display: inline-flex; align-items: baseline; }\n\n  .modal-footer {\n    display: flex; justify-content: flex-end; gap: 10px;\n    margin-top: 24px; padding-top: 18px;\n    border-top: 1px solid var(--line);\n  }\n  .modal-btn {\n    padding: 10px 18px; border-radius: 4px; cursor: pointer;\n    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700;\n    transition: all 0.2s; font-family: 'Inter Tight';\n    border: 1px solid transparent;\n  }\n  .modal-btn.reset {\n    background: transparent; border-color: var(--line-2); color: var(--text-3);\n  }\n  .modal-btn.reset:hover { border-color: var(--text-3); color: var(--text-2); }\n  .modal-btn.cancel {\n    background: transparent; border-color: var(--line-2); color: var(--text-2);\n  }\n  .modal-btn.cancel:hover { border-color: var(--text-2); color: var(--text); }\n  .modal-btn.save {\n    background: var(--m-accent, var(--brand)); border-color: var(--m-accent, var(--brand)); color: #14110a;\n  }\n  .modal-btn.save:hover { filter: brightness(1.1); transform: translateY(-1px); }\n\n  .modal-close {\n    position: absolute; top: 14px; right: 14px;\n    width: 28px; height: 28px; border-radius: 4px;\n    border: 1px solid var(--line); background: var(--bg-3);\n    color: var(--text-3); cursor: pointer;\n    display: grid; place-items: center;\n    font-size: 16px; line-height: 1;\n    transition: all 0.2s;\n  }\n  .modal-close:hover { border-color: var(--text-3); color: var(--text); }\n\n\n  /* ============================================================== */\n  /* =====  EXECUTIVE SUMMARY ROW (MVP donut + Burn + Status) ===== */\n  /* ============================================================== */\n  /* --- project resource links --- */\n  .mc-res { margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--line); }\n  .mc-res-lbl { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-3); font-weight: 600; margin-bottom: 11px; }\n  .mc-res-row { display: flex; flex-wrap: wrap; gap: 10px; }\n  .res-chip {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 10px 16px; border-radius: 8px;\n    background: var(--bg-3); border: 1px solid var(--line-2);\n    text-decoration: none; color: var(--text-2); font-size: 15px; font-weight: 500;\n    transition: border-color 0.18s, color 0.18s, background 0.18s;\n  }\n  .res-chip:hover { border-color: var(--brand); color: var(--text); background: rgba(201,162,106,0.06); }\n  .res-chip svg { width: 20px; height: 20px; flex-shrink: 0; }\n  .res-chip .rc-sub { color: var(--text-4); font-size: 12px; margin-left: 2px; }\n  .res-chip.muted { pointer-events: none; opacity: 0.5; border-style: dashed; }\n  .res-chip peat(' + Object.keys(BLOCKS).length + ', ' + rowH + 'px)';\n\n  // Corner (col 1, row 1)\n  const corner = document.createElement('div');\n  corner.className = 'g-corner';\n  corner.textContent = 'BLOCK';\n  corner.style.gridRow = '1';\n  corner.style.gridColumn = '1';\n  grid.appendChild(corner);\n\n  // Month headers (row 1)\n  MONTHS.forEach((m, i) => {\n    const cell = document.createElement('div');\n    cell.className = 'g-month' + (i === 0 ? ' now' : '');\n    cell.style.gridRow = '1';\n    cell.style.gridColumn = (i + 2) + ' / span 1';\n    cell.innerHTML = `<b>${m.label}<\u002Fb><span>'${m.year.toString().slice(-2)}<\u002Fspan>`;\n    grid.appendChild(cell);\n  });\n\n  // Milestone rail label (col 1, row 2)\n  const railLabel = document.createElement('div');\n  railLabel.className = 'g-rail-label';\n  railLabel.style.gridRow = '2';\n  railLabel.style.gridColumn = '1';\n  railLabel.textContent = 'ВЕХИ · MILESTONES';\n  grid.appendChild(railLabel);\n\n  // Milestone rail cells\n  for (let m = 0; m < 12; m++) {\n    const cell = document.createElement('div');\n    cell.className = 'g-rail-cell';\n    cell.style.gridRow = '2';\n    cell.style.gridColumn = (m + 2) + ' / span 1';\n    grid.appendChild(cell);\n  }\n\n  // Swimlanes (rows 3..8)\n  const ROWS = Object.keys(BLOCKS);\n  ROWS.forEach((blockKey, rowIdx) => {\n    const b = BLOCKS[blockKey];\n    const gridRow = rowIdx + 3;\n    const lbl = document.createElement('div');\n    lbl.className = 'g-label';\n    lbl.style.gridRow = gridRow;\n    lbl.style.gridColumn = '1';\n    lbl.innerHTML = `\n      <div class=\"sw\" style=\"background: ${b.color}\"><\u002Fdiv>\n      <div class=\"txt\">\n        <div class=\"t\">${b.title}<\u002Fdiv>\n        <div class=\"s\">${b.en}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"count\">${b.tasks.length}<\u002Fdiv>\n    `;\n    lbl.addEventListener('click', () => selectBlock(blockKey));\n    lbl.style.cursor = 'pointer';\n    grid.appendChild(lbl);\n\n    for (let m = 0; m < 12; m++) {\n      const cell = document.createElement('div');\n      cell.className = 'g-cell' + (m === 0 ? ' now' : '');\n      cell.style.gridRow = gridRow;\n      cell.style.gridColumn = (m + 2) + ' / span 1';\n      grid.appendChild(cell);\n    }\n  });\n\n  g.appendChild(grid);\n\n  // ===== Bars layer =====\n  const barsLayer = document.createElement('div');\n  barsLayer.className = 'gantt-bars';\n  // Top offset = monthH + railH (bars are positioned relative to start of swimlanes area)\n  barsLayer.style.top = (monthH + railH) + 'px';\n\n  // Main bars\n  GANTT_DATA.forEach((bar, i) => {\n    const el = document.createElement('div');\n    el.className = `g-bar bar-${bar.block}`;\n    el.style.left = (bar.start * colW) + 'px';\n    el.style.width = ((bar.end - bar.start) * colW) + 'px';\n    el.style.top = (bar.row * rowH + 14) + 'px';\n    el.style.animationDelay = (0.3 + i * 0.08) + 's';\n    el.textContent = bar.label;\n    el.title = bar.label;\n    el.addEventListener('click', () => selectBlock(bar.block));\n    barsLayer.appendChild(el);\n  });\n\n  // Phase bars — respect _laneHint when provided, else auto-assign to first free lane\n  const lanesByRow = {};\n  PHASE_DATA.forEach(p => {\n    if (!lanesByRow[p.row]) lanesByRow[p.row] = [];\n    let lane = -1;\n    if (typeof p._laneHint === 'number') {\n      lane = p._laneHint;\n    } else {\n      for (let L = 0; L < 3; L++) {\n        const overlap = lanesByRow[p.row].some(prev => prev.lane === L && !(p.end <= prev.start || p.start >= prev.end));\n        if (!overlap) { lane = L; break; }\n      }\n      if (lane < 0) lane = 0;\n    }\n    lanesByRow[p.row].push({ start: p.start, end: p.end, lane });\n    p._lane = lane;\n  });\n\n  PHASE_DATA.forEach((p, i) => {\n    const el = document.createElement('div');\n    el.className = 'g-bar phase';\n    el.style.color = BLOCKS[p.block].color;\n    el.style.left = (p.start * colW + 4) + 'px';\n    el.style.width = Math.max(20, (p.end - p.start) * colW - 8) + 'px';\n    // main bar at top:14 height:28 → ends at 42. lanes: 0→52, 1→82, 2→112 (well-spaced)\n    const top = p._lane === 0 ? 52 : (p._lane === 1 ? 82 : 112);\n    el.style.top = (p.row * rowH + top) + 'px';\n    el.style.animationDelay = (1.0 + i * 0.03) + 's';\n    // wrap label in span with background so it stays readable when extending\n    const span = document.createElement('span');\n    span.className = 'phase-text';\n    span.style.color = BLOCKS[p.block].color;\n    span.style.opacity = '0.95';\n    span.textContent = p.label;\n    el.appendChild(span);\n    el.title = p.label;\n    barsLayer.appendChild(el);\n  });\n\n  // ===== Milestones rail (separate from bars layer — overlays above the swimlanes) =====\n  const railLayer = document.createElement('div');\n  railLayer.style.position = 'absolute';\n  railLayer.style.top = monthH + 'px';\n  railLayer.style.left = parseFloat(cs.getPropertyValue('--label-w')) + 'px';\n  railLayer.style.height = railH + 'px';\n  railLayer.style.width = (colW * 12) + 'px';\n  railLayer.style.pointerEvents = 'none';\n  railLayer.style.zIndex = '4';\n\n  // Sort milestones by col to stagger tip-up / tip-down\n  const sortedM = MILESTONES.slice().sort((a, b) => a.col - b.col);\n  sortedM.forEach((ms, i) => {\n    const el = document.createElement('div');\n    const tipDir = (i % 2 === 0) ? 'tip-up' : 'tip-down';\n    el.className = 'g-milestone ' + tipDir + (ms.crit ? ' crit' : '');\n    el.style.left = (ms.col * colW) + 'px';\n    el.style.top = (railH / 2 - 7) + 'px';\n    el.style.pointerEvents = 'auto';\n    el.style.animationDelay = (1.4 + i * 0.06) + 's';\n    // tip label removed — keep diamond clean; native title for hover\n    el.title = ms.label;\n    railLayer.appendChild(el);\n\n    // Vertical guide line dropping into swimlanes\n    const guide = document.createElement('div');\n    guide.className = 'g-guide' + (ms.crit ? ' crit' : '');\n    guide.style.left = (ms.col * colW) + 'px';\n    guide.style.top = (railH / 2) + 'px';\n    guide.style.height = (rowH * Object.keys(BLOCKS).length + railH / 2) + 'px';\n    railLayer.appendChild(guide);\n  });\n  g.appendChild(railLayer);\n\n  // Dependencies (SVG overlay) — only between swimlanes\n  const depsSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');\n  depsSvg.setAttribute('class', 'gantt-deps');\n  const totalW = colW * 12;\n  const totalH = rowH * Object.keys(BLOCKS).length + 24;\n  depsSvg.style.position = 'absolute';\n  depsSvg.style.left = '0';\n  depsSvg.style.top = '0';\n  depsSvg.style.width = totalW + 'px';\n  depsSvg.style.height = totalH + 'px';\n\n  DEPS.forEach(d => {\n    const x1 = d.fromCol * colW;\n    const y1 = d.fromRow * rowH + 28;\n    const x2 = d.toCol * colW;\n    const y2 = d.toRow * rowH + 28;\n    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');\n    const dx = Math.max(20, Math.abs(x2 - x1) / 3);\n    path.setAttribute('d', `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`);\n    if (d.crit) path.setAttribute('class', 'crit');\n    depsSvg.appendChild(path);\n    const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');\n    arrow.setAttribute('points', `${x2-6},${y2-3} ${x2-6},${y2+3} ${x2},${y2}`);\n    arrow.setAttribute('class', d.crit ? 'crit-head' : 'head');\n    depsSvg.appendChild(arrow);\n  });\n  // dependency arrows removed for visual clarity\n\n  // Today line — May 25 ~ 0.8 of May (25/31)\n  const today = document.createElement('div');\n  today.className = 'gantt-today';\n  today.style.left = (0.87 * colW) + 'px';\n  today.style.top = '-' + railH + 'px';  // start from top of milestone rail\n  today.style.height = (rowH * Object.keys(BLOCKS).length + railH) + 'px';\n  barsLayer.appendChild(today);\n\n  g.appendChild(barsLayer);\n}\n\n// ===================================================================\n// BLOCK SWITCHER + TASK PANEL\n// ===================================================================\nconst STATUS_OPTIONS = [\n  { id: 'done',     label: 'ГОТОВО',    cls: 'ok',    sw: '#4ec98a' },\n  { id: 'progress', label: 'В РАБОТЕ',  cls: 'info',  sw: '#6ba8e8' },\n  { id: 'review',   label: 'НА РЕВЬЮ',  cls: 'plan',  sw: '#8a7fe0' },\n  { id: 'todo',     label: 'НЕ НАЧАТО', cls: 'muted', sw: '#666' },\n  { id: 'paused',   label: 'НА ПАУЗЕ',  cls: 'warn',  sw: '#e8a33b' },\n  { id: 'crit',     label: 'КРИТ',      cls: 'bad',   sw: '#e0584f' },\n];\n\nlet currentBlock = 'design';\nconst TASK_KEY = 'hector_v13_tasks_';\n\nfunction loadTasksFor(blockKey) {\n  try {\n    const raw = localStorage.getItem(TASK_KEY + currentProject + '_' + blockKey);\n    if (raw) {\n      const parsed = JSON.parse(raw);\n      if (Array.isArray(parsed)) return parsed.filter(t => t && typeof t === 'object');\n    }\n  } catch (e) {}\n  return JSON.parse(JSON.stringify((BLOCKS[blockKey] && BLOCKS[blockKey].tasks) || [])).filter(t => t && typeof t === 'object');\n}\nfunction saveTasksFor(blockKey, list) {\n  try { localStorage.setItem(TASK_KEY + currentProject + '_' + blockKey, JSON.stringify(list)); } catch (e) {}\n}\n\nfunction selectBlock(blockKey) {\n  currentBlock = blockKey;\n  document.querySelectorAll('.b-tab').forEach(t => t.classList.toggle('active', t.dataset.block === blockKey));\n\n  const b = BLOCKS[blockKey];\n  const accent = b.color;\n  document.getElementById('bInfo').style.setProperty('--accent', accent);\n  document.getElementById('bTasksPanel').style.setProperty('--accent', accent);\n\n  const idx = Object.keys(BLOCKS).indexOf(blockKey) + 1;\n  document.getElementById('bEyebrow').textContent = `FUNCTIONAL BLOCK · ${String(idx).padStart(2,'0')} OF ${String(Object.keys(BLOCKS).length).padStart(2,'0')}`;\n  document.getElementById('bTitle').textContent = b.title;\n  document.getElementById('bDesc').textContent = b.desc;\n  document.getElementById('bPeriod').textContent = `${b.period.start} → ${b.period.end}`;\n  document.getElementById('bOwner').textContent = b.owner;\n  document.getElementById('bAv').textContent = b.avatar;\n  document.getElementById('bAv').style.borderColor = accent;\n  document.getElementById('bAv').style.color = accent;\n\n  // stats\n  const tasksNow = loadTasksFor(blockKey);\n  const overdueCount = tasksNow.filter(t => isOverdue(t.due) && t.status !== 'done').length;\n  const doneCount = tasksNow.filter(t => t.status === 'done').length;\n  const pct = Math.round((doneCount / tasksNow.length) * 100) || b.progress;\n  document.getElementById('bStats').innerHTML = `\n    <div class=\"s brand\"><div class=\"l\">Готовность<\u002Fdiv><div class=\"v\">${b.progress}%<\u002Fdiv><\u002Fdiv>\n    <div class=\"s\"><div class=\"l\">Задач<\u002Fdiv><div class=\"v\">${tasksNow.length}<\u002Fdiv><\u002Fdiv>\n    <div class=\"s crit\"><div class=\"l\">Просрочено<\u002Fdiv><div class=\"v\">${overdueCount}<\u002Fdiv><\u002Fdiv>\n    <div class=\"s\"><div class=\"l\">Дедлайн<\u002Fdiv><div class=\"v\">${b.stats.deadline}<\u002Fdiv><\u002Fdiv>\n  `;\n\n  // phases\n  const phEl = document.getElementById('bPhases');\n  phEl.innerHTML = '';\n  b.phases.forEach(ph => {\n    const div = document.createElement('div');\n    div.className = 'ph-row ' + (ph.state === 'active' ? 'active' : (ph.state === 'done' ? 'done' : ''));\n    div.innerHTML = `\n      <div class=\"pn\">${ph.n}<\u002Fdiv>\n      <div class=\"pname\">${ph.name}<\u002Fdiv>\n      <div class=\"pdate\">${ph.period}<\u002Fdiv>\n    `;\n    phEl.appendChild(div);\n  });\n\n  // extra slot — show Нарек banner if security\n  const extra = document.getElementById('bExtra');\n  if (blockKey === 'sec') {\n    extra.innerHTML = `\n      <div class=\"naret-banner\" style=\"margin-top: 16px;\">\n        <div class=\"icn\">\n          <svg viewBox=\"0 0 24 24\"><path d=\"M3 5 C3 4 4 3 5 3 H8 L10 8 L8 9 C9 12 12 15 15 16 L16 14 L21 16 V19 C21 20 20 21 19 21 C10 21 3 14 3 5 Z\" stroke-width=\"1.8\"/><\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div class=\"ttl\">PRIORITY · Переговоры с охранным бюро<\u002Fdiv>\n          <div class=\"sub\">Бюро найдено (чеченское). Нарек согласовывает условия. Затем — <b>договоры с бюро и клиентом<\u002Fb> (нужны юристы).<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  } else {\n    extra.innerHTML = '';\n  }\n\n  renderTasks();\n}\n\nfunction isOverdue(due) {\n  const TODAY = new Date(2026, 4, 27);\n  const m = String(due).match(/^(\\d{1,2})\\.(\\d{1,2})/);\n  if (!m) return false;\n  const d = parseInt(m[1], 10), mo = parseInt(m[2], 10) - 1;\n  return new Date(2026, mo, d).getTime() < TODAY.getTime();\n}\n\nfunction statusInfo(id) { return STATUS_OPTIONS.find(s => s.id === id) || STATUS_OPTIONS[3]; }\n\nfunction escapeHtml(s) {\n  return String(s).replace(/[&<>\"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;' }[c]));\n}\n\nfunction renderTasks() {\n  const list = document.getElementById('taskList');\n  list.innerHTML = '';\n  const tasks = loadTasksFor(currentBlock);\n  const accent = BLOCKS[currentBlock].color;\n  tasks.forEach((t, i) => {\n    if (!t) return;\n    const overdueDate = isOverdue(t.due) && t.status !== 'done';\n    const st = statusInfo(t.status);\n    const prog = getProgress(t);\n    const li = document.createElement('li');\n    li.className = 'task-item';\n    li.draggable = true;\n    li.dataset.id = t.id;\n    li.style.setProperty('--m-accent', accent);\n    li.innerHTML = `\n      <div class=\"task-handle\" title=\"Перетащить\">⋮⋮<\u002Fdiv>\n      <div class=\"task-num\">${String(i+1).padStart(2,'0')}<\u002Fdiv>\n      <div class=\"task-body\">\n        <div class=\"task-name\" contenteditable=\"true\" spellcheck=\"false\" data-field=\"name\">${escapeHtml(t.name)}<\u002Fdiv>\n        <div class=\"task-dept\" contenteditable=\"true\" spellcheck=\"false\" data-field=\"dept\">${escapeHtml(t.dept)}<\u002Fdiv>\n        <div class=\"task-progress-bar\" title=\"Прогресс ${prog}% · клик для редактирования\"><i style=\"width: ${prog}%\" nMenu = menu;\n}\nfunction closeStatusMenu() { if (openMenu) { openMenu.remove(); openMenu = null; } }\ndocument.addEventListener('click', closeStatusMenu);\n\ndocument.getElementById('addTask').addEventListener('click', () => {\n  const id = 'n' + Date.now();\n  const tasks = loadTasksFor(currentBlock);\n  tasks.push({ id, name: '', dept: BLOCKS[currentBlock].title, owner: '—', due: '30.06', status: 'todo' });\n  saveTasksFor(currentBlock, tasks);\n  renderTasks();\n  setTimeout(() => {\n    const li = document.querySelector(`.task-item[data-id=\"${id}\"]`);\n    if (li) {\n      li.querySelector('.task-name').focus();\n      li.scrollIntoView({ block: 'nearest', behavior: 'smooth' });\n    }\n  }, 50);\n});\n\ndocument.getElementById('resetTasks').addEventListener('click', () => {\n  if (confirm('Сбросить задачи блока к исходному состоянию?')) {\n    localStorage.removeItem(TASK_KEY + currentProject + '_' + currentBlock);\n    renderTasks();\n  }\n});\n\n// (Block tab clicks are wired in renderBlockTabs)\n\n// ===================================================================\n// COUNTERS / CLOCK / COUNTDOWN\n// ===================================================================\nfunction animateCounter(el) {\n  const target = parseFloat(el.dataset.counter);\n  const dur = 1400;\n  const start = performance.now();\n  function step(now) {\n    const t = Math.min(1, (now - start) / dur);\n    const eased = 1 - Math.pow(1 - t, 3);\n    const v = target * eased;\n    el.textContent = Math.round(v);\n    if (t < 1) requestAnimationFrame(step);\n    else el.textContent = target;\n  }\n  requestAnimationFrame(step);\n}\nsetTimeout(() => {\n  document.querySelectorAll('.counter[data-counter]').forEach((el, i) => setTimeout(() => animateCounter(el), i * 80));\n}, 300);\n\nlet LAUNCH = new Date('2026-10-01T09:00:00+02:00').getTime();\nfunction tickCountdown() {\n  const now = Date.now();\n  let diff = Math.max(0, LAUNCH - now);\n  const days = Math.floor(diff / 86400000); .style.overflowX = 'hidden';\n  }\n  window.addEventListener('resize', fitViewport);\n  window.addEventListener('load', () => setTimeout(fitViewport, 100));\n  fitViewport();\n})();\n\n// ===================================================================\n// INIT\n// ===================================================================\n// ===================================================================\n// TASK MODAL\n// ===================================================================\nconst DEFAULT_PROGRESS = { done: 100, review: 80, progress: 50, paused: 30, todo: 0, crit: 0 };\n\nfunction getProgress(t) {\n  if (!t) return 0;\n  if (typeof t.progress === 'number') return Math.max(0, Math.min(100, t.progress));\n  return DEFAULT_PROGRESS[t.status] ?? 0;\n}\n\n// Parse 'dd.mm' or 'dd.mm.yyyy' → Date\nfunction parseDdmm(s, defaultYear) {\n  if (!s) return null;\n  const m = String(s).match(/^(\\d{1,2})\\.(\\d{1,2})(?:\\.(\\d{4}))?/);\n  if (!m) return null;\n  return new Date(parseInt(m[3] || defaultYear || 2026, 10), parseInt(m[2], 10) - 1, parseInt(m[1], 10));\n}\n\n// Date → 'YYYY-MM-DD' for <input type=\"date\">\nfunction toIso(d) {\n  if (!d) return '';\n  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');\n}\n\n// 'YYYY-MM-DD' → Date\nfunction fromIso(s) {\n  if (!s) return null;\n  const [y, m, d] = s.split('-').map(Number);\n  return new Date(y, m - 1, d);\n}\n\n// Date → 'dd.mm' (used in task row) — drop year for compactness\nfunction toDdmm(d, withYear) {\n  if (!d) return '';\n  const dd = String(d.getDate()).padStart(2, '0');\n  const mm = String(d.getMonth() + 1).padStart(2, '0');\n  return withYear ? `${dd}.${mm}.${d.getFullYear()}` : `${dd}.${mm}`;\n}\n\nfunction addDays(d, n) {\n  const r = new Date(d.getTime());\n  r.setDate(r.getDate() + n);\n  return r;\n}\n\nfunction daysBetween(a, b) {\n  return Math.round((b - a) / 86400000);\n}\n\nfunction getStartDate(t) {\n  const end r.style.setProperty('--p', p + '%');\n  document.getElementById('modalProgressLabel').textContent = p + '%';\n  document.getElementById('modalProgressPct').textContent = p + '%';\n}\n\nfunction updateModalDuration() {\n  const s = fromIso(document.getElementById('modalStart').value);\n  const e = fromIso(document.getElementById('modalEnd').value);\n  if (!s || !e) {\n    document.getElementById('modalDuration').textContent = '—';\n    return;\n  }\n  const days = daysBetween(s, e);\n  const el = document.getElementById('modalDuration');\n  el.textContent = days + ' дн';\n  el.classList.toggle('crit', days < 0);\n}\n\n// Modal event wiring\ndocument.getElementById('modalProgress').addEventListener('input', e => {\n  const v = parseInt(e.target.value, 10);\n  updateModalProgressUI(v);\n});\ndocument.getElementById('modalStart').addEventListener('change', updateModalDuration);\ndocument.getElementById('modalEnd').addEventListener('change', updateModalDuration);\n\ndocument.getElementById('modalSave').addEventListener('click', () => {\n  if (!modalTaskId) return;\n  const tasks = loadTasksFor(currentBlock);\n  const t = tasks.find(x => x.id === modalTaskId);\n  if (!t) return;\n\n  const startIso = document.getElementById('modalStart').value;\n  const endIso   = document.getElementById('modalEnd').value;\n  const startD = fromIso(startIso);\n  const endD   = fromIso(endIso);\n  if (startD) t.start = toDdmm(startD, true);\n  if (endD)   t.due   = toDdmm(endD);\n\n  const prog = parseInt(document.getElementById('modalProgress').value, 10);\n  t.progress = prog;\n\n  const newName = document.getElementById('modalTitle').textContent.trim();\n  const newDesc = document.getElementById('modalDesc').textContent.trim();\n  if (newName) t.name = newName;\n  if (newDesc) t.dept = newDesc;\n\n  // auto-update status from progress\n  if (prog === 100 && t.status !== 'done') t.status = 'done';\n  else if (prog >= 80 && (t.status === 'todo' || t.status === 'crit')) t.status = 'review';\n  else if (prog > 0 && prog < 80 && (t.status === 'todo' || t.status === 'crit')) t.status = 'progress';\n  else if (prog === 0 && t.status === 'done') t.status = 'todo';\n\n  saveTasksFor(currentBlock, tasks);\n  renderTasks();\n  closeTaskModal();\n});\n\ndocument.getElementById('modalReset').addEventListener('click', () => {\n  if (!modalOriginalTask) return;\n  document.getElementById('modalTitle').textContent = modalOriginalTask.name || '';\n  document.getElementById('modalDesc').textContent = modalOriginalTask.dept || '';\n  const startD = getStartDate(modalOriginalTask);\n  const endD = parseDdmm(modalOriginalTask.due);\n  document.getElementById('modalStart').value = toIso(startD);\n  document.getElementById('modalEnd').value = toIso(endD);\n  const prog = getProgress(modalOriginalTask);\n  document.getElementById('modalProgress').value = prog;\n  updateModalProgressUI(prog);\n  updateModalDuration();\n});\n\ndocument.getElementById('modalCancel').addEventListener('click', closeTaskModal);\ndocument.getElementById('modalClose').addEventListener('click', closeTaskModal);\ndocument.getElementById('taskModal').addEventListener('click', e => {\n  if (e.target.id === 'taskModal') closeTaskModal();\n});\ndocument.addEventListener('keydown', e => {\n  if (e.key === 'Escape' && modalTaskId) closeTaskModal();\n});\n\n\n\n// ===================================================================\n// EXECUTIVE SUMMARY (MVP donut, burndown, status donut)\n// ===================================================================\nfunction renderExecSummary() {\n  let total = 0, progSum = 0;\n  const counts = { done: 0, progress: 0, review: 0, todo: 0, paused: 0, crit: 0 };\n  Object.keys(BLOCKS).forEach(k => {\n    const arr = loadTasksFor(k);\n    arr.forEach(t => {\n      if (!t) return;\n      total += 1;\n      progSum += getProgress(t);\n      if (counts.hasOwnProperty(t.status)) counts[t.status] += 1;\n      else counts.todo += 1;\n    });\n  });\n\n  // Aggregate for status donut\n  const done   = counts.done;\n  const work   = counts.progress + counts.review;\n  const wait   = counts.todo + counts.paused;\n  const block  = counts.crit;\n  const sum    = done + work + wait + block || 1;\n\n  // Update Tasks-by-Status donut & legend\n  const ratios = {\n    done: done / sum,\n    work: work / sum,\n    wait: wait / sum,\n    block: block / sum,\n  };\n  const d = ratios.done * 100;\n  const w = (ratios.done + ratios.work) * 100;\n  const aw = (ratios.done + ratios.work + ratios.wait) * 100;\n  const conic = `conic-gradient(\n    var(--ok) 0% ${d}%,\n    var(--info) ${d}% ${w}%,\n    var(--warn) ${w}% ${aw}%,\n    var(--bad) ${aw}% 100%\n  )`;\n  const sd = document.getElementById('statusDonut');\n  if (sd) sd.style.setProperty('--status-bg', conic);\n  const st = document.getElementById('statusTotal');\n  if (st) st.textContent = total;\n  const sh = document.getElementById('totalTasksHdr');\n  if (sh) sh.textContent = total;\n\n  const leg = document.getElementById('statusLegend');\n  if (leg) {\n    const pct = v => ((v / sum) * 100).toFixed(0) + '%';\n    leg.innerHTML = `\n      <div class=\"row\"><span class=\"sw\" style=\"background: var(--ok);\"><\u002Fspan><span class=\"v\">${done}<\u002Fspan><span class=\"name\">Завершено<\u002Fspan><span class=\"pct\">${pct(done)}<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"sw\" style=\"background: var(--info);\"><\u002Fspan><span class=\"v\">${work}<\u002Fspan><span class=\"name\">В работе<\u002Fspan><span class=\"pct\">${pct(work)}<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"sw\" style=\"background: var(--warn);\"><\u002Fspan><span class=\"v\">${wait}<\u002Fspan><span class=\"name\">В ожидании<\u002Fspan><span class=\"pct\">${pct(wait)}<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"sw\" style=\"background: var(--bad);\"><\u002Fspan><span class=\"v\">${block}<\u002Fspan><span class=\"name\">Заблокировано<\u002Fspan><span class=\"pct\">${pct(block)}<\u002Fspan><\u002Fdiv>\n    `;\n  }\n\n  // MVP readiness donut — weighted average progress across ALL tasks below\n  const mvpPct = total ? Math.round(progSum / total) : 0;\n  const md = document.getElementById('mvpDonut');\n  if (md) md.style.setProperty('--p', mvpPct + '%');\n  const mp = document.getElementById('mvpPct');\n  if (mp) mp.textContent = mvpPct + '%';\n  const mr = document.getElementById('mvpRatio');\n  if (mr) mr.textContent = done + ' / ' + total;\n\n  // Status tag — phrasing for premium/operational tone (no negative wording)\n  const tag = document.getElementById('mvpStatusTag');\n  if (tag) {\n    let label, cls;\n    if (mvpPct >= 80)      { label = 'Финальная фаза'; cls = ''; }\n    else if (mvpPct >= 50) { label = 'Активная разработка'; cls = ''; }\n    else if (mvpPct >= 25) { label = 'Подготовка к запуску'; cls = ''; }\n    else if (mvpPct >= 10) { label = 'Старт работ'; cls = ''; }\n    else                   { label = 'Подготовительная фаза'; cls = ''; }\n    tag.textContent = label;\n    tag.className = 'status-tag';\n  }\n\n  // Burndown \"now\" percent\n  const bn = document.getElementById('burnNow');\n  if (bn) bn.textContent = Math.max(mvpPct, (PROJECTS[currentProject].burndown && PROJECTS[currentProject].burndown.nowFloor) || 0) + '%';\n  renderBurndown();\n}\n\n// Per-project burndown chart renderer\nfunction renderBurndown() {\n  const cont = document.getElementById('burnChart');\n  if (!cont) return;\n  const cfg = (PROJECTS[currentProject] && PROJECTS[currentProject].burndown) || null;\n  if (!cfg) { cont.innerHTML = ''; return; }\n  const X0 = 40, X1 = 560, Y0 = 180, Y1 = 20;\n  const fx = t => X0 + t * (X1 - X0);\n  const fy = p => Y0 - p * (Y0 - Y1);\n  const planPts = cfg.plan.map(([t,p]) => fx(t) + ',' + fy(p)).join(' ');\n  const actPts  = cfg.actual.map(([t,p]) => fx(t) + ',' + fy(p)).join(' ');\n  const lastA = cfg.actual[cfg.actual.length - 1];\n  const goalT = cfg.goalT != null ? cfg.goalT : 1;\n  const months = cfg.months.map((m,i) => `<text class=\"axis-label\" x=\"${fx(cfg.monthsT[i])}\" y=\"196\">${m}<\u002Ftext>`).join('');\n  const planDots = cfg.plan.slice(1).map(([t,p],i) => `<circle cx=\"${fx(t)}\" cy=\"${fy(p)}\" r=\"${i===cfg.plan.length-2?4:3}\"${i===cfg.plan.length-2?' class=\"goal-marker\"':''}/>`).join('');\n  cont.innerHTML = `\n    <svg class=\"burn-svg\" viewBox=\"0 0 580 200\" preserveAspectRatio=\"none\">\n      <g class=\"grid-line\">\n        <line x1=\"40\" y1=\"20\" x2=\"560\" y2=\"20\"/><line x1=\"40\" y1=\"60\" x2=\"560\" y2=\"60\"/>\n        <line x1=\"40\" y1=\"100\" x2=\"560\" y2=\"100\"/><line x1=\"40\" y1=\"140\" x2=\"560\" y2=\"140\"/>\n      <\u002Fg>\n      <line class=\"axis-line\" x1=\"40\" y1=\"180\" x2=\"560\" y2=\"180\"/>\n      <line class=\"axis-line\" x1=\"40\" y1=\"20\" x2=\"40\" y2=\"180\"/>\n      <text class=\"axis-label\" x=\"32\" y=\"24\" text-anchor=\"end\">100%<\u002Ftext>\n      <text class=\"axis-label\" x=\"32\" y=\"64\" text-anchor=\"end\">75%<\u002Ftext>\n      <text class=\"axis-label\" x=\"32\" y=\"104\" text-anchor=\"end\">50%<\u002Ftext>\n      <text class=\"axis-label\" x=\"32\" y=\"144\" text-anchor=\"end\">25%<\u002Ftext>\n      <text class=\"axis-label\" x=\"32\" y=\"184\" text-anchor=\"end\">0%<\u002Ftext>\n      ${months}\n      <polyline class=\"plan\" points=\"${planPts}\"/>\n      <g class=\"pt pt-plan\">${planDots}<\u002Fg>\n      <polyline class=\"actual\" points=\"${actPts}\"/>\n      <g class=\"pt pt-actual\"><circle cx=\"${fx(lastA[0])}\" cy=\"${fy(lastA[1])}\" r=\"4\" stroke=\"#0b0f15\" stroke-width=\"2\"/><\u002Fg>\n      <line class=\"today-line\" x1=\"${fx(cfg.todayT)}\" y1=\"20\" x2=\"${fx(cfg.todayT)}\" y2=\"180\"/>\n      <text class=\"axis-label\" x=\"${fx(cfg.todayT)+4}\" y=\"32\" fill=\"#c9a26a\">${cfg.todayLabel} ↓<\u002Ftext>\n      <text class=\"axis-label\" x=\"552\" y=\"14\" text-anchor=\"end\" fill=\"#c9a26a\" font-weight=\"700\">${cfg.goalLabel} ←<\u002Ftext>\n    <\u002Fsvg>`;\n}\n\n// Hook into renderTasks (re-render summary whenever tasks change)\nconst _origRenderTasks = renderTasks;\nrenderTasks = function() {\n  _origRenderTasks.apply(this, arguments);\n  renderExecSummary();\n};\n\n// Initial render\nrenderExecSummary();\n\n// ===================================================================\n// MULTI-PROJECT RENDER + EDIT MODE\n// ===================================================================\nfunction blockProgress(b, key) {\n  const tasks = loadTasksFor(key);\n  if (!tasks.length) return b.progress || 0;\n  const done = tasks.filter(t => t && t.status === 'done').length;\n  // weighted by progress field if present\n  let sum = 0; tasks.forEach(t => { if(!t) return; sum += (typeof t.progress==='number'? t.progress : (t.status==='done'?100:0)); });\n  return Math.round(sum / tasks.length);\n}\n\nfunction renderBlockTabs() {\n  const wrap = document.getElementById('blockTabs');\n  wrap.innerHTML = '';\n  Object.keys(BLOCKS).forEach((key, i) => {\n    const b = BLOCKS[key];\n    const tasks = loadTasksFor(key);\n    const pct = blockProgress(b, key);\n    const per = (b.period? (b.period.start.slice(0,5)+' \\u2192 '+b.period.end.slice(0,5)) : '\\u2014');\n    const tab = document.createElement('div');\n    tab.className = 'b-tab' + (key === currentBlock ? ' active' : '');\n    tab.dataset.block = key;\n    tab.style.setProperty('--accent', b.color);\n    tab.innerHTML = `\n      <div class=\"head\"><div><div class=\"name\">${b.title}<\u002Fdiv><div class=\"en\">${b.en}<\u002Fdiv><\u002Fdiv><div class=\"count\">${tasks.length}<\u002Fdiv><\u002Fdiv>\n      <div class=\"meta\"><div><div class=\"lbl\">\\u041f\\u0435\\u0440\\u0438\\u043e\\u0434<\u002Fdiv><div class=\"val\">${per}<\u002Fdiv><\u002Fdiv><div><div class=\"lbl\">\\u0413\\u043e\\u0442\\u043e\\u0432\\u043d\\u043e\\u0441\\u0442\\u044c<\u002Fdiv><div class=\"val\">${pct}%<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"progress\"><i style=\"--w: ${pct/100};\"><\u002Fi><\u002Fdiv>`;\n    tab.addEventListener('click', () => selectBlock(key));\n    wrap.appendChild(tab);\n  });\n}\n\nconst RES_ICONS = {\n  figma: '<svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M8 24a4 4 0 0 0 4-4v-4H8a4 4 0 1 0 0 8Z\" fill=\"#0ACF83\"/><path d=\"M4 12a4 4 0 0 1 4-4h4v8H8a4 4 0 0 1-4-4Z\" fill=\"#A259FF\"/><path d=\"M4 4a4 4 0 0 1 4-4h4v8H8a4 4 0 0 1-4-4Z\" fill=\"#F24E1E\"/><path d=\"M12 0h4a4 4 0 0 1 0 8h-4V0Z\" fill=\"#FF7262\"/><path d=\"M20 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z\" fill=\"#1ABCFE\"/><\u002Fsvg>',\n  drive: '<svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M8.5 2 1 15l3.75 6.5L12 8.5 8.5 2Z\" fill=\"#0066DA\"/><path d=\"M15.5 2h-7L15.5 15h7L15.5 2Z\" fill=\"#00AC47\"/><path d=\"M4.75 21.5h14.5L23 15H8.25l-3.5 6.5Z\" fill=\"#FFBA00\"/><\u002Fsvg>',\n  docs: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6ba8e8\" stroke-width=\"1.6\"><path d=\"M6 2h8l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1Z\"/><path d=\"M13 2v5h5M8 12h8M8 16h8M8 8h3\"/><\u002Fsvg>',\n  link: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c9a26a\" stroke-width=\"1.7\"><path d=\"M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5\"/><path d=\"M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5\"/><\u002Fsvg>',\n};\nconst RESOURCES = {\n  hector: [\n    { label: 'Figma', kind: 'figma', sub: 'макеты приложения', url: 'https://www.figma.com/design/ZYVFhb1m7phkhpXdqXUF9M/Hector?node-id=4764-17380&t=tysEr6HtyavMWX2l-1' },\n    { label: 'Google Drive', kind: 'drive', sub: 'документы проекта', url: 'https://drive.google.com/drive/folders/1eZ_H1uv7LpXJPrykUsmnGQGuGZXuvvFt?usp=drive_link' },\n    { label: 'Финмодель', kind: 'docs', sub: '2026–2027', url: 'https://docs.google.com/spreadsheets/d/1v3S1nYj8hu1LrA_vU5QfZHuFLggaKJoz/edit?usp=drive_link&ouid=112552903294295578953&rtpof=true&sd=true' },\n    { label: 'Brand presentation', kind: 'link', sub: 'PDF', url: 'https://drive.google.com/file/d/1sgchXJJxTDFlN06SBzbRSz99wLkrXCIH/view?usp=drive_link' },\n    { label: 'hectorvip.com', kind: 'link', sub: 'лендинг', url: 'https://hectorvip.com/' },\n  ],\n  openrn: [\n    { label: 'Figma', kind: 'figma', sub: 'прототипы + лендинг', url: 'https://www.figma.com/design/9JQK5ikGNakFRzFUeYxzDN/Landig-page-Open-RN?node-id=1286-274283&t=uXfAeF6awIpCug9R-1' },\n    { label: 'Презентация', kind: 'docs', sub: 'OpenRN', url: 'https://drive.google.com/file/d/1U8BVsfr7YAjAvuyfv3rgmRvgJnjhpFme/view?usp=drive_link' },\n  ],\n  treserve: [\n    { label: 'Figma', kind: 'figma', sub: 'прототип TRS Card', url: 'https://www.figma.com/design/RUVdwJ9mD5CMedeXouKZGp/Mobile-App_Treserve?node-id=0-1&t=Cw0zISvmXGOyCHYz-1' },\n    { label: 'Презентация продукта', kind: 'docs', sub: 'TRS Card', url: 'https://drive.google.com/file/d/1wlkLZELBUo2FfWtvXU_nTTH65ILXGIgE/view?usp=drive_link' },\n  ],\n  dobro: [\n    { label: 'Figma', kind: 'figma', sub: 'MVP + корзина', url: 'https://www.figma.com/design/KPDszVVdLOAIwbjvx2VB1f/%D0%94%D0%BE%D0%B1%D1%80%D0%BE-Web-app?node-id=2-32809&t=bXqRMUp7y3LtWfCN-1' },\n    { label: 'Google Drive', kind: 'drive', sub: 'договор + ТЗ', url: 'https://drive.google.com/drive/folders/1eZ_H1uv7LpXJPrykUsmnGQGuGZXuvvFt?usp=drive_link' },\n    { label: 'Договор Альфа-Банк', kind: 'docs', sub: 'АБ-2', url: 'https://docs.google.com/document/d/1HgUfSRxX2-ZKrhBMx7VWery8kuKs7BNf/edit?usp=drive_link&ouid=112552903294295578953&rtpof=true&sd=true' },\n    { label: 'Презентация', kind: 'link', sub: 'к встрече', url: '#' },\n  ],\n};\nfunction renderResources() {\n  const list = RESOURCES[currentProject] || [];\n  if (!list.length) return '';\n  const chips = list.map(r => {\n    const muted = (!r.url || r.url === '#') ? ' muted' : '';\n    const href = muted ? '' : `href=\"${r.url}\" target=\"_blank\" rel=\"noopener\"`;\n    return `<a class=\"res-chip${muted}\" ${href}>${RES_ICONS[r.kind]||RES_ICONS.link}<span>${r.label}<\u002Fspan><span class=\"rc-sub\">${muted?'не задано':r.sub}<\u002Fspan><\u002Fa>`;\n  }).join('');\n  return `<div class=\"mc-res\"><div class=\"mc-res-lbl\">Данные по проекту · файлы и макеты<\u002Fdiv><div class=\"mc-res-row\">${chips}<\u002Fdiv><\u002Fdiv>`;\n}\n\nfunction renderMission() {\n  const p = PROJECTS[currentProject];\n  const m = p.mission;\n  const critStyle = m.crit\n    ? 'background: rgba(224, 88, 79, 0.10); border-color: rgba(224, 88, 79, 0.40); color: var(--bad);'\n    : 'background: rgba(201, 162, 106, 0.10); border-color: rgba(201, 162, 106, 0.35); color: var(--brand);';\n  const dotStyle = m.crit ? 'background: var(--bad); color: var(--bad);' : 'background: var(--brand); color: var(--brand);';\n  const hero = document.getElementById('missionHero');\n  const ce = editMode ? 'contenteditable=\"true\" spellcheck=\"false\"' : '';\n  const ceCls = editMode ? ' editable-on' : '';\n  hero.innerHTML = `\n    <div class=\"mc-status\" style=\"${critStyle}\">\n      <span class=\"d\" style=\"${dotStyle}\"><\u002Fspan>\n      <span class=\"${editMode?'editable-on':''}\" ${ce} data-m=\"status\">${m.status}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"mc-head${ceCls}\" ${ce} data-m=\"head\">${m.head}<\u002Fdiv>\n    <div class=\"mc-sub${ceCls}\" ${ce} data-m=\"sub\">${m.sub}<\u002Fdiv>\n    <div class=\"mc-stats\">\n      ${m.stats.map((s,i) => `<div class=\"mc-stat${i===0?' brand':''}\"><div class=\"l\">${s.l}<\u002Fdiv><div class=\"v\">${s.v}<\u002Fdiv><div class=\"s\">${s.s}<\u002Fdiv><\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n    ${renderResources()}`;\n  const c = p.countdown;\n  const cd = document.getElementById('missionCountdown');\n  cd.innerHTML = `\n    <div class=\"mc-cd-head\">\n      <div class=\"l\">${c.label}<\u002Fdiv>\n      <div class=\"r\">T-MINUS<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mc-cd-grid\">\n      <div class=\"cd-cell\"><div class=\"n\" id=\"cd-d\">\\u2014<\u002Fdiv><div class=\"l\">\\u0434\\u043d\\u0435\\u0439<\u002Fdiv><\u002Fdiv>\n      <div class=\"cd-cell\"><div class=\"n\" id=\"cd-h\">\\u2014<\u002Fdiv><div class=\"l\">\\u0447\          <h2>Отчёт · ${R.label}<\u002Fh2>\n          <div class=\"meta\">HECTOR · OpenRN Law · Treserve · Добро.рф — что сделано, готовность и блокеры<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gen\"><div class=\"k\">Отправить<\u002Fdiv><div class=\"v\">${R.generated}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-summary\">\n        <span class=\"tag\">Итог месяца · честно<\u002Fspan>\n        <div class=\"txt\">${R.summary}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-scorebar\">\n        ${R.scores.map(s=>`<div class=\"rp-score\"><div class=\"v ${s.cls}\">${s.v}<\u002Fdiv><div class=\"l\">${s.l}<\u002Fdiv><\u002Fdiv>`).join('')}\n      <\u002Fdiv>\n      <div class=\"rp-grid\">${R.projects.map(renderReportProject).join('')}<\u002Fdiv>`;\n  }\n\n  document.getElementById('reportsView').innerHTML = `\n    <div class=\"rp-months\">${monthTabs}<\u002Fdiv>\n    ${content}`;\n\n  document.querySelectorAll('#reportsView .rp-month').forEach(el => {\n    el.addEventListener('click', () => { currentReportMonth = el.dataset.month; renderReportsView(); });\n  });\n}\n\nfunction showReportsView() {\n  document.body.classList.remove('theme-dobro');\n  document.body.classList.remove('view-me');\n  document.body.classList.add('view-rep');\n  document.querySelectorAll('.proj-tab').forEach(t => t.classList.toggle('active', t.dataset.proj === 'reports'));\n  document.getElementById('brandLogo').style.display = 'none';\n  const lt = document.getElementById('brandText');\n  lt.style.display = 'block'; lt.textContent = 'Отчёты';\n  document.getElementById('crumbText').textContent = 'Ежемесячный отчёт · для Нарека';\n  document.getElementById('h1Text').textContent = 'Отчёты по проектам';\n  document.getElementById('subtitleText').textContent = 'Помесячно · что сделано, готовность, блокеры и анализ сроков';\n  renderReportsView();\n}\n\nfunction switchProject(id) {\n  if (id === 'natali') { showPersonalView(); return; }\n  if (id === 'reports') { showReportsView(); return; }\n  if (!PROJECTS[id]) return;\n  document.body.classList.remove('view-me');\n  document.body.classList.remove('view-rep');\n  currentProject = id;\n  document.body.classList.toggle('theme-dobro', id === 'dobro');\n  const p = PROJECTS[id];\n  BLOCKS = p.blocks;\n  GANTT_DATA = p.gantt;\n  PHASE_DATA = p.phases;\n  MILESTONES = p.milestones;\n  CRIT_PATH = JSON.parse(JSON.stringify(p.crit_path));\n  try { const cpo = localStorage.getItem('cp_edit_' + id); if (cpo) CRIT_PATH = JSON.parse(cpo); } catch(e){}\n  try { const mo = localStorage.getItem('mission_edit_' + id); if (mo) { const o = JSON.parse(mo); Object.assign(p.mission, o); } } catch(e){}\n  currentBlock = Object.keys(BLOCKS)[0];\n\n  // project tabs active state\n  document.querySelectorAll('.proj-tab').forEach(t => t.classList.toggle('active', t.dataset.proj === id));\n  // header\n  const logoImg = document.getElementById('brandLogo');\n  const logoText = document.getElementById('brandText');\n  if (p.logo) { logoImg.src = (window.__resources && p.logoId && window.__resources[p.logoId]) || p.logo; logoImg.style.display='inline-block'; logoImg.style.filter = p.logoRaw ? 'none' : ''; logoImg.style.height = (id === 'treserve' ? '24px' : (id === 'dobro' ? '34px' : '44px')); logoText.style.display='none'; }\n  else { logoImg.style.display='none'; logoText.style.display='block'; logoText.textContent = p.name; }\n  document.getElementById('crumbText').textContent = p.crumb;\n  document.getElementById('h1Text').textContent = p.h1;\n  document.getElementById('subtitleText').textContent = p.subtitle;\n\n  renderMission();\n  renderBlockTabs();\n  renderCritPath();\n  renderGantt();\n  selectBlock(currentBlock);\n  renderExecSummary();\n  applyEditMode();\n}\n\n// ---- EDIT MODE ----\nfunction blockOverrideKey() { return 'proj_edit_' + currentProject; }\nfunction loadOverrides() {\n  try { return JSON.parse(localStorage.getItem(blockOverrideKey()) || '{}'); } catch(e){ return {}; }\n}\nfunction saveOverride(blockKey, field, value) {\n  const o = loadOverrides();\n  o[blockKey] = o[blockKey] || {};\n  o[blockKey][field] = value;\n  localStorage.setItem(blockOverrideKey(), JSON.stringify(o));\n  if (BLOCKS[blockKey]) {\n    if (field === 'period') {} else BLOCKS[blockKey][field] = value;\n  }\n}\nfunction applyOverridesToBlocks() {\n  const o = loadOverrides();\n  Object.keys(o).forEach(bk => {\n    if (!BLOCKS[bk]) return;\n    if (o[bk].title) BLOCKS[bk].title = o[bk].title;\n    if (o[bk].desc) BLOCKS[bk].desc = o[bk].desc;\n    if (o[bk].owner) BLOCKS[bk].owner = o[bk].owner;\n  });\n}\nfunction applyEditMode() {\n  const fields = ['bTitle','bDesc','bOwner'];\n  fields.forEach(fid => {\n    const el = document.getElementById(fid);\n    if (!el) return;\n    el.contentEditable = editMode ? 'true' : 'false';\n    el.classList.toggle('editable-on', editMode);\n  });\n  const btn = document.getElementById('editToggle');\n  if (btn) {\n    btn.classList.toggle('active', editMode);\n    btn.innerHTML = editMode ? '\\u2713 \\u0413\\u043e\\u0442\\u043e\\u0432\\u043e' : '\\u270e \\u0420\\u0435\\u0434\\u0430\\u043a\\u0442\\u0438\\u0440\\u043e\\u0432\\u0430\\u0442\\u044c';\n  }\n  document.body.classList.toggle('edit-active', editMode);\n  renderCritPath();\n  renderMission();\n}\nfunction wireEditableBlockFields() {\n  const map = { bTitle:'title', bDesc:'desc', bOwner:'owner' };\n  Object.keys(map).forEach(fid => {\n    const el = document.getElementById(fid);\n    if (!el || el._wired) return;\n    el._wired = true;\n    el.addEventListener('blur', () => {\n      if (!editMode) return;\n      saveOverride(currentBlock, map[fid], el.textContent.trim());\n      renderBlockTabs();\n    });\n  });\n}\n\n// ===================================================================\n// INIT (must be after all function/const declarations)\n// ===================================================================\napplyOverridesToBlocks();\nwireEditableBlockFields();\ndocument.querySelectorAll('.proj-tab').forEach(t => {\n  t.addEventListener('click', () => switchProject(t.dataset.proj));\n});\nconst editBtn = document.getElementById('editToggle');\nif (editBtn) editBtn.addEventListener('click', () => { editMode = !editMode; applyEditMode(); });\n\nswitchProject('hector');\nwindow.addEventListener('resize', () => renderGantt());\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
